name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check terrainflow_assessment/

      - name: Run tests with coverage
        # fail_under=95 is set in pyproject.toml [tool.coverage.report]; Qt/QGIS UI
        # files are omitted there — only pure-Python modules/ are gated.
        run: pytest tests/ --cov=terrainflow_assessment --cov-report=term-missing

      - name: Grep-gate — forbidden deprecated APIs
        run: |
          if grep -rn 'QVariant\.\(String\|Int\|Double\)\|writeAsVectorFormat\b\|\.exec_()' terrainflow_assessment/; then
            echo "ERROR: forbidden deprecated API found — see lines above"
            exit 1
          fi
          echo "Grep-gate passed."
