name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest

    # Run inside the official QGIS image so `qgis` / PyQt are importable — the
    # plugin (and several modules that re-export QThread workers) depend on them,
    # so a plain Python runner cannot even import the test suite.
    container:
      image: qgis/qgis:ltr

    env:
      # Qt needs a platform plugin; run headless without a display server.
      QT_QPA_PLATFORM: offscreen
      # QGIS image Python is PEP-668 "externally managed"; allow pip to install
      # into it (unknown to older pip, harmlessly ignored).
      PIP_BREAK_SYSTEM_PACKAGES: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Confirm QGIS is importable
        run: python3 -c "import qgis; from qgis.PyQt.QtCore import QThread; print('QGIS import OK')"

      - name: Install dev/test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: python3 -m ruff check terrainflow_assessment/

      - name: Run tests with coverage
        # fail_under=95 is set in pyproject.toml [tool.coverage.report]; Qt/QGIS UI
        # files are omitted there — only pure-Python modules/ are gated.
        run: python3 -m pytest tests/ --cov=terrainflow_assessment --cov-report=term-missing

      - name: Grep-gate — forbidden deprecated APIs
        run: |
          if grep -rn 'QVariant\.\(String\|Int\|Double\)\|writeAsVectorFormat\b\|\.exec_()' terrainflow_assessment/; then
            echo "ERROR: forbidden deprecated API found — see lines above"
            exit 1
          fi
          echo "Grep-gate passed."
